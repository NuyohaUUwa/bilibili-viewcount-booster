<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站播放量 - Booster</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      max-width: 960px; margin: 0 auto; padding: 24px; background: #f5f5f5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 20px; }
    .form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
    .form input { padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .form input[type="text"] { width: 220px; }
    .form input[type="number"] { width: 120px; }
    .form button { padding: 9px 18px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; color: #fff; }
    .form button:disabled { cursor: not-allowed; opacity: 0.55; }
    .btn-start { background: #0a7; }
    .btn-stop { background: #c33; }
    .cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .card { background: #fff; padding: 12px 16px; border-radius: 8px; min-width: 110px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card .label { font-size: 11px; color: #888; margin-bottom: 3px; }
    .card .value { font-size: 17px; font-weight: 600; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .log-header span { font-size: 13px; color: #666; }
    .btn-detail { padding: 5px 14px; border: 1px solid #aaa; border-radius: 5px; background: #fff; font-size: 12px; cursor: pointer; }
    .btn-detail.active { background: #333; color: #fff; border-color: #333; }
    .log-panel {
      background: #1a1a2e; color: #d4d4d4;
      font-family: "Consolas", "Monaco", "Courier New", monospace; font-size: 12.5px;
      padding: 14px; border-radius: 8px; height: 380px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all; line-height: 1.45;
    }
    .log-panel .collapsed { display: none; }
    .log-panel .progress-line { color: #8a8; }
    .log-panel .success-line { color: #6d6; }
    .log-panel .fail-line { color: #d66; }
    .log-panel .info-line { color: #6bd; }
  </style>
</head>
<body>
  <h1>B站播放量刷量</h1>

  <div class="form">
    <input type="text" id="bv" placeholder="BV号或AV号" />
    <input type="number" id="target" placeholder="目标播放量" min="1" value="1000" />
    <button class="btn-start" id="btnStart">开始</button>
    <button class="btn-stop" id="btnStop" disabled>停止</button>
  </div>

  <div class="cards">
    <div class="card"><div class="label">阶段</div><div class="value" id="phase">空闲</div></div>
    <div class="card"><div class="label">成功次数</div><div class="value" id="hits">0</div></div>
    <div class="card"><div class="label">当前播放量</div><div class="value" id="views">-</div></div>
    <div class="card"><div class="label">播放增量</div><div class="value" id="viewsInc">0</div></div>
    <div class="card"><div class="label">代理总数</div><div class="value" id="totalProxies">0</div></div>
    <div class="card"><div class="label">可用代理</div><div class="value" id="activeProxies">0</div></div>
  </div>

  <div class="log-header">
    <span>运行日志</span>
    <button class="btn-detail" id="btnDetail">详细</button>
  </div>
  <div class="log-panel" id="logPanel"></div>

<script>
const $ = id => document.getElementById(id);
const bvInput = $('bv'), targetInput = $('target');
const btnStart = $('btnStart'), btnStop = $('btnStop'), btnDetail = $('btnDetail');
const phaseEl = $('phase'), hitsEl = $('hits'), viewsEl = $('views'), viewsIncEl = $('viewsInc');
const totalProxiesEl = $('totalProxies'), activeProxiesEl = $('activeProxies');
const logPanel = $('logPanel');

let evtSource = null;
let detailMode = false;
let allLines = [];

const PROGRESS_RE = /^\d+\/\d+\s.*━/;
const NEXT_ROUND_RE = /next round:/;
const FILTER_PROGRESS_RE = /^\d+\/\d+\s.*\d+\.\d+%/;

function isRepetitiveLine(line) {
  return PROGRESS_RE.test(line) || NEXT_ROUND_RE.test(line) || FILTER_PROGRESS_RE.test(line);
}

function classifyLine(line) {
  if (/success/i.test(line)) return 'success-line';
  if (/fail/i.test(line)) return 'fail-line';
  if (/successfully|collected|Initial|Finish|Statistics/i.test(line)) return 'info-line';
  if (isRepetitiveLine(line)) return 'progress-line';
  return '';
}

function renderLogs() {
  logPanel.innerHTML = '';
  let lastRepetitiveIdx = -1;
  if (!detailMode) {
    for (let i = allLines.length - 1; i >= 0; i--) {
      if (isRepetitiveLine(allLines[i])) { lastRepetitiveIdx = i; break; }
    }
  }
  for (let i = 0; i < allLines.length; i++) {
    const line = allLines[i];
    const span = document.createElement('span');
    span.textContent = line + '\n';
    const cls = classifyLine(line);
    if (cls) span.className = cls;
    if (!detailMode && isRepetitiveLine(line) && i !== lastRepetitiveIdx) {
      span.className += ' collapsed';
    }
    logPanel.appendChild(span);
  }
  logPanel.scrollTop = logPanel.scrollHeight;
}

function appendLine(line) {
  allLines.push(line);
  const isRep = isRepetitiveLine(line);
  if (!detailMode && isRep) {
    const spans = logPanel.querySelectorAll('span.progress-line:not(.collapsed)');
    spans.forEach(s => { if (!s.classList.contains('collapsed')) s.classList.add('collapsed'); });
  }
  const span = document.createElement('span');
  span.textContent = line + '\n';
  const cls = classifyLine(line);
  if (cls) span.className = cls;
  logPanel.appendChild(span);
  logPanel.scrollTop = logPanel.scrollHeight;
}

function setRunning(running) {
  btnStart.disabled = running;
  btnStop.disabled = !running;
}

const PHASE_MAP = { idle: '空闲', fetching: '拉取代理', filtering: '筛选代理', boosting: '刷量中' };

function updateStatus(s) {
  if (!s) return;
  phaseEl.textContent = PHASE_MAP[s.phase] || s.phase || '空闲';
  hitsEl.textContent = s.hits ?? 0;
  const cv = s.current_views ?? 0;
  viewsEl.textContent = cv > 0 ? cv : '-';
  viewsIncEl.textContent = s.views_increase ?? 0;
  totalProxiesEl.textContent = s.total_proxies ?? 0;
  activeProxiesEl.textContent = s.active_proxies ?? 0;
  if (s.running !== undefined) setRunning(s.running);
}

function connectStream() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/stream');
  evtSource.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'log') {
        appendLine(d.line);
        if (d.status) updateStatus(d.status);
      } else if (d.type === 'done') {
        appendLine('[任务结束]');
        updateStatus(d);
        setRunning(false);
      } else if (d.type === 'heartbeat') {
        updateStatus(d);
      }
    } catch (_) {}
  };
  evtSource.onerror = function() { evtSource.close(); setTimeout(connectStream, 2000); };
}

btnDetail.onclick = function() {
  detailMode = !detailMode;
  btnDetail.classList.toggle('active', detailMode);
  btnDetail.textContent = detailMode ? '精简' : '详细';
  renderLogs();
};

btnStart.onclick = async function() {
  const bv = bvInput.value.trim(), t = parseInt(targetInput.value, 10);
  if (!bv) { alert('请输入BV号或AV号'); return; }
  if (isNaN(t) || t < 1) { alert('请输入有效的目标播放量'); return; }
  try {
    const res = await fetch('/start', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bv, target: t })
    });
    const j = await res.json();
    if (j.ok) { setRunning(true); allLines = []; logPanel.innerHTML = ''; appendLine('开始: ' + bv + ' -> 目标 ' + t); }
    else alert(j.message || '启动失败');
  } catch (err) { alert('请求失败: ' + err.message); }
};

btnStop.onclick = async function() {
  try {
    const res = await fetch('/stop', { method: 'POST' });
    const j = await res.json();
    if (j.ok) setRunning(false);
  } catch (err) { alert('请求失败: ' + err.message); }
};

(async function init() {
  try { const r = await fetch('/status'); updateStatus(await r.json()); } catch(_) {}
  connectStream();
})();
</script>
</body>
</html>
